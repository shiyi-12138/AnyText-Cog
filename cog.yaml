build:
  gpu: true
  python_version: "3.10"
  system_packages:
    - "ffmpeg"
    - "wget"
    - "git"
    - "libgl1-mesa-glx"
    - "libglib2.0-0"
  python_packages:
    - "torch==2.0.1"
    - "torchvision==0.15.2"
    - "diffusers==0.10.2"
    - "transformers==4.30.2"
    - "opencv-python==4.7.0.72"
    - "numpy==1.23.3"
    - "pillow==9.5.0"
    - "scipy"
    - "cog==0.9.0"
    - "accelerate"
    - "ftfy"
    - "sentencepiece==0.1.99"
    - "modelscope==1.10.0"
    - "omegaconf==2.2.3"
    - "einops==0.4.1"
    - "safetensors==0.4.0"
    - "easydict==1.10"
    - "imageio==2.9.0"
    - "pytorch-lightning==1.5.0"
    - "timm==0.6.7"
    - "kornia==0.6.7"
    - "open-clip-torch==2.7.0"
  run:
    - "pip install basicsr==1.4.2 addict==2.4.0 yapf==0.32.0 test-tube==0.7.5 webdataset==0.2.5 torchmetrics==0.11.4 jieba==0.42.1 subword-nmt==0.3.8 sacremoses==0.0.53"
    - "pip install xformers==0.0.20 --index-url https://download.pytorch.org/whl/cu118"
    - "mkdir -p /src/checkpoints /src/fonts"
    - "python -c \"from modelscope.hub.snapshot_download import snapshot_download; snapshot_download('damo/cv_anytext_text_generation_editing', revision='v1.1.3')\""
    - "python -c \"from huggingface_hub import snapshot_download; snapshot_download('runwayml/stable-diffusion-v1-5')\""
predict: "predict.py:Predictor"
